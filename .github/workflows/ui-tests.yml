name: UI Test Automation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up JDK 11
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: maven
    
    - name: Install Chrome
      run: |
        wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
        sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google.list'
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable
    
    - name: Run Tests
      id: tests
      run: |
        mvn clean test -Dheadless=true
        echo "test_result=$?" >> $GITHUB_OUTPUT
      continue-on-error: true
    
    - name: Generate Allure Report
      if: always()
      run: mvn allure:report
    
    - name: Deploy Allure Report to GitHub Pages
      if: always()
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: target/site/allure-maven-plugin
        destination_dir: allure-report-${{ github.run_number }}
    
    - name: Upload Allure Results
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: allure-results
        path: target/allure-results
        retention-days: 30
    
    - name: Upload Test Reports
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: test-reports
        path: target/surefire-reports
        retention-days: 30
    
    - name: Parse Test Results
      if: always()
      id: test-results
      run: |
        TOTAL=$(grep -oP 'Tests run: \K[0-9]+' target/surefire-reports/*.txt | head -1 || echo "0")
        FAILURES=$(grep -oP 'Failures: \K[0-9]+' target/surefire-reports/*.txt | head -1 || echo "0")
        ERRORS=$(grep -oP 'Errors: \K[0-9]+' target/surefire-reports/*.txt | head -1 || echo "0")
        SKIPPED=$(grep -oP 'Skipped: \K[0-9]+' target/surefire-reports/*.txt | head -1 || echo "0")
        PASSED=$((TOTAL - FAILURES - ERRORS - SKIPPED))
        PASS_RATE=$(awk "BEGIN {printf \"%.2f\", ($PASSED/$TOTAL)*100}")
        
        echo "total=$TOTAL" >> $GITHUB_OUTPUT
        echo "passed=$PASSED" >> $GITHUB_OUTPUT
        echo "failures=$FAILURES" >> $GITHUB_OUTPUT
        echo "errors=$ERRORS" >> $GITHUB_OUTPUT
        echo "skipped=$SKIPPED" >> $GITHUB_OUTPUT
        echo "pass_rate=$PASS_RATE" >> $GITHUB_OUTPUT
    
    - name: Create Test Summary
      if: always()
      run: |
        echo "## 🧪 Test Execution Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
        echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
        echo "| ✅ Total Tests | ${{ steps.test-results.outputs.total }} |" >> $GITHUB_STEP_SUMMARY
        echo "| ✔️ Passed | ${{ steps.test-results.outputs.passed }} |" >> $GITHUB_STEP_SUMMARY
        echo "| ❌ Failed | ${{ steps.test-results.outputs.failures }} |" >> $GITHUB_STEP_SUMMARY
        echo "| ⚠️ Errors | ${{ steps.test-results.outputs.errors }} |" >> $GITHUB_STEP_SUMMARY
        echo "| ⏭️ Skipped | ${{ steps.test-results.outputs.skipped }} |" >> $GITHUB_STEP_SUMMARY
        echo "| 📊 Pass Rate | ${{ steps.test-results.outputs.pass_rate }}% |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📄 Reports" >> $GITHUB_STEP_SUMMARY
        echo "- [Allure Report](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/allure-report-${{ github.run_number }})" >> $GITHUB_STEP_SUMMARY
        echo "- [Workflow Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
    
    - name: Send Slack Notification
      if: always()
      uses: slackapi/slack-github-action@v1.24.0
      with:
        payload: |
          {
            "blocks": [
              {
                "type": "header",
                "text": {
                  "type": "plain_text",
                  "text": "${{ steps.tests.outputs.test_result == '0' && '✅' || '❌' }} UI Test Automation Results"
                }
              },
              {
                "type": "section",
                "fields": [
                  {
                    "type": "mrkdwn",
                    "text": "*Repository:*\n${{ github.repository }}"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Branch:*\n${{ github.ref_name }}"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Triggered by:*\n${{ github.actor }}"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Workflow:*\n${{ github.workflow }}"
                  }
                ]
              },
              {
                "type": "section",
                "fields": [
                  {
                    "type": "mrkdwn",
                    "text": "*Total Tests:* ${{ steps.test-results.outputs.total }}"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Passed:* ✅ ${{ steps.test-results.outputs.passed }}"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Failed:* ❌ ${{ steps.test-results.outputs.failures }}"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Pass Rate:* 📊 ${{ steps.test-results.outputs.pass_rate }}%"
                  }
                ]
              },
              {
                "type": "actions",
                "elements": [
                  {
                    "type": "button",
                    "text": {
                      "type": "plain_text",
                      "text": "View Allure Report"
                    },
                    "url": "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/allure-report-${{ github.run_number }}"
                  },
                  {
                    "type": "button",
                    "text": {
                      "type": "plain_text",
                      "text": "View Workflow"
                    },
                    "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                ]
              }
            ]
          }
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
    
    - name: Send Email Notification
      if: always()
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 587
        username: ${{ secrets.EMAIL_USERNAME }}
        password: ${{ secrets.EMAIL_PASSWORD }}
        subject: "${{ steps.tests.outputs.test_result == '0' && '✅' || '❌' }} UI Test Results - ${{ github.repository }}"
        to: ${{ secrets.EMAIL_RECIPIENTS }}
        from: UI Test Automation
        html_body: |
          <!DOCTYPE html>
          <html>
          <head>
            <style>
              body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
              .container { max-width: 600px; margin: 0 auto; padding: 20px; }
              .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; border-radius: 5px; }
              .content { background: #f4f4f4; padding: 20px; margin-top: 20px; border-radius: 5px; }
              .stats { display: table; width: 100%; margin: 20px 0; }
              .stat { display: table-cell; text-align: center; padding: 15px; background: white; border-radius: 5px; margin: 5px; }
              .stat-value { font-size: 24px; font-weight: bold; }
              .passed { color: #28a745; }
              .failed { color: #dc3545; }
              .button { display: inline-block; padding: 10px 20px; background: #667eea; color: white; text-decoration: none; border-radius: 5px; margin: 10px 5px; }
              .footer { text-align: center; margin-top: 20px; color: #666; font-size: 12px; }
            </style>
          </head>
          <body>
            <div class="container">
              <div class="header">
                <h1>🧪 UI Test Automation Results</h1>
                <p><strong>Repository:</strong> ${{ github.repository }}</p>
                <p><strong>Branch:</strong> ${{ github.ref_name }}</p>
                <p><strong>Triggered by:</strong> ${{ github.actor }}</p>
              </div>
              <div class="content">
                <h2>Test Summary</h2>
                <div class="stats">
                  <div class="stat">
                    <div class="stat-value">${{ steps.test-results.outputs.total }}</div>
                    <div>Total Tests</div>
                  </div>
                  <div class="stat">
                    <div class="stat-value passed">${{ steps.test-results.outputs.passed }}</div>
                    <div>Passed</div>
                  </div>
                  <div class="stat">
                    <div class="stat-value failed">${{ steps.test-results.outputs.failures }}</div>
                    <div>Failed</div>
                  </div>
                  <div class="stat">
                    <div class="stat-value">${{ steps.test-results.outputs.pass_rate }}%</div>
                    <div>Pass Rate</div>
                  </div>
                </div>
                <div style="text-align: center;">
                  <a href="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/allure-report-${{ github.run_number }}" class="button">View Allure Report</a>
                  <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" class="button">View Workflow</a>
                </div>
              </div>
              <div class="footer">
                <p>This is an automated message from GitHub Actions</p>
              </div>
            </div>
          </body>
          </html>
